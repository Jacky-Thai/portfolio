<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body class="bg-white font-sans text-gray-800">

  <!-- NAVIGATION BAR -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="text-xl font-bold">My Portfolio</div>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex space-x-8">
          <a href="index.html" class="hover:text-orange-600 font-medium">About Me</a>
          <a href="personal.html" class="hover:text-orange-600 font-medium">Personal Project</a>
          <a href="freelance.html" class="hover:text-orange-600 font-medium">Freelance Project</a>
          <a href="mapping.html" class="hover:text-orange-600 font-medium">Indoor Mapping</a>
        </nav>

        <!-- Mobile Menu Button -->
        <div class="md:hidden">
          <button id="menu-btn" class="text-gray-700 focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="md:hidden hidden px-4 pb-4 space-y-2">
      <a href="index.html" class="block text-gray-700 hover:text-orange-600">About Me</a>
      <a href="personal.html" class="block text-gray-700 hover:text-orange-600">Personal Project</a>
      <a href="freelance.html" class="block text-gray-700 hover:text-orange-600">Freelance Project</a>
      <a href="mapping.html" class="block text-gray-700 hover:text-orange-600">Indoor Mapping</a>
    </div>
  </header>

  <!-- JS Toggle for Mobile Menu -->
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  </script>

  <!-- CONTENT SECTION -->
  <main class="space-y-0">
    <!-- Image Section 83 -->
    <section class="w-full m-0 p-0 leading-none mt-16">
      <img src="./Image/8.3.jpg" alt="Personal Project 83"
           class="w-full h-auto block" />
    </section>

    <!-- Image Section uudai -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/uudai.jpg" alt="Personal Project Uudai"
           class="w-full h-auto block" />
    </section>

    <!-- Image Section mungdaile -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/mungdaile.jpg" alt="Personal Project Mungdaile"
           class="w-full h-auto block" />
    </section>
    
      <!-- Image Section dauthangluongve -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/dauthangluongve.jpg" alt="Personal Project Dauthangluongve"
           class="w-full h-auto block" />
    </section>
    
          <!-- Image Section Gaming -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/Gaming.jpg" alt="Personal Project Gaming"
           class="w-full h-auto block" />
    </section>
    
      <!-- Image Section Cocoon -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/Cocoon.jpg" alt="Personal Project Cocoon"
           class="w-full h-auto block" />
      
      <!-- Image Section Menu -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/Menu.jpg" alt="Personal Project Menu Brochure"
           class="w-full h-auto block" />
      
    </section>
      <!-- Image Section Illustration -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/illustration.jpg" alt="Personal Project Illustration"
           class="w-full h-auto block" />
    </section>

      <!-- Image Section Line Illustration -->
    <section class="w-full m-0 p-0 leading-none">
      <img src="./Image/line illustration.jpg" alt="Personal Project Line Illustration"
           class="w-full h-auto block" />
    </section>
    
    <!-- Add more sections as needed -->
  </main>

</body>
</html>
